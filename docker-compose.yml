services:
  tree-eclass:
    build: .
    container_name: tree-eclass
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      # Persist database
      - ./data:/data
    environment:
      - DB_FILE=/data/eclass.db
      - KNOWLEDGE_DB_FILE=/data/knowledge.db
      - KNOWLEDGE_ENABLED=true
      - KNOWLEDGE_WORKER_ENABLED=true
      - KNOWLEDGE_MAX_EXTRACTED_CHARS=10000000
      - KNOWLEDGE_OCR_ENABLED=true
      - KNOWLEDGE_OCR_LANGUAGES=ell+eng
      - KNOWLEDGE_EMBEDDING_BACKEND=openrouter
      - KNOWLEDGE_EMBEDDING_MODEL=openai/text-embedding-3-small
      - KNOWLEDGE_EMBEDDING_LOCAL_FALLBACK=true
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      # Cached per-file descriptions. The Cloud 397B model prioritizes analysis quality
      # for Greek/English course material; override without rebuilding.
      - KNOWLEDGE_AI_ENABLED=${KNOWLEDGE_AI_ENABLED:-true}
      - KNOWLEDGE_AI_MODEL=${KNOWLEDGE_AI_MODEL:-qwen3.5:397b}
      - KNOWLEDGE_AI_LANGUAGE=${KNOWLEDGE_AI_LANGUAGE:-English}
      - KNOWLEDGE_AI_ANALYSIS_VERSION=${KNOWLEDGE_AI_ANALYSIS_VERSION:-2}
      - KNOWLEDGE_AI_PDF_VISION_ENABLED=${KNOWLEDGE_AI_PDF_VISION_ENABLED:-true}
      - KNOWLEDGE_AI_PDF_MAX_IMAGES=${KNOWLEDGE_AI_PDF_MAX_IMAGES:-4}
      # Analyze every PDF page, then synthesize each document. Queue priority is
      # derived from the registered exam dates.
      - KNOWLEDGE_AI_PAGE_ENABLED=${KNOWLEDGE_AI_PAGE_ENABLED:-true}
      - KNOWLEDGE_AI_PAGE_ANALYSIS_VERSION=${KNOWLEDGE_AI_PAGE_ANALYSIS_VERSION:-1}
      - KNOWLEDGE_AI_PAGE_MAX_TEXT_CHARS=${KNOWLEDGE_AI_PAGE_MAX_TEXT_CHARS:-12000}
      - KNOWLEDGE_AI_PAGE_SYNTHESIS_MAX_CHARS=${KNOWLEDGE_AI_PAGE_SYNTHESIS_MAX_CHARS:-300000}
      # Ollama Cloud exposes quota windows only on the authenticated settings
      # page. The worker fails closed when this cookie-backed gate cannot check.
      - KNOWLEDGE_AI_QUOTA_ENABLED=${KNOWLEDGE_AI_QUOTA_ENABLED:-true}
      - OLLAMA_COOKIE_HEADER=${OLLAMA_COOKIE_HEADER:-}
      - KNOWLEDGE_AI_QUOTA_SESSION_LIMIT_PERCENT=${KNOWLEDGE_AI_QUOTA_SESSION_LIMIT_PERCENT:-95}
      - KNOWLEDGE_AI_QUOTA_WEEKLY_LIMIT_PERCENT=${KNOWLEDGE_AI_QUOTA_WEEKLY_LIMIT_PERCENT:-95}
      - KNOWLEDGE_AI_QUOTA_POLL_SECONDS=${KNOWLEDGE_AI_QUOTA_POLL_SECONDS:-60}
      - KNOWLEDGE_AI_QUOTA_MAX_REQUESTS_BETWEEN_CHECKS=${KNOWLEDGE_AI_QUOTA_MAX_REQUESTS_BETWEEN_CHECKS:-20}
      - KNOWLEDGE_AI_QUOTA_RESET_GRACE_SECONDS=${KNOWLEDGE_AI_QUOTA_RESET_GRACE_SECONDS:-30}
      - KNOWLEDGE_AI_QUOTA_FAILURE_RETRY_SECONDS=${KNOWLEDGE_AI_QUOTA_FAILURE_RETRY_SECONDS:-300}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-}
      - "MCP_ALLOWED_HOSTS=${MCP_ALLOWED_HOSTS:-127.0.0.1:*,localhost:*,[::1]:*,uni.lan,uni.lan:*}"
      - "MCP_ALLOWED_ORIGINS=${MCP_ALLOWED_ORIGINS:-http://127.0.0.1:*,http://localhost:*,http://[::1]:*,https://uni.lan,https://uni.lan:*}"
      - MCP_HTTP_ENABLED=true
      # - LOG_LEVEL=DEBUG
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
