services:
  tree-eclass:
    build: .
    container_name: tree-eclass
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      # Persist database
      - ./data:/data
    environment:
      - DB_FILE=/data/eclass.db
      - KNOWLEDGE_DB_FILE=/data/knowledge.db
      - KNOWLEDGE_ENABLED=true
      - KNOWLEDGE_WORKER_ENABLED=true
      - KNOWLEDGE_MAX_EXTRACTED_CHARS=10000000
      - KNOWLEDGE_OCR_ENABLED=true
      - KNOWLEDGE_OCR_LANGUAGES=ell+eng
      - KNOWLEDGE_EMBEDDING_BACKEND=openrouter
      - KNOWLEDGE_EMBEDDING_MODEL=openai/text-embedding-3-small
      - KNOWLEDGE_EMBEDDING_LOCAL_FALLBACK=true
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - "MCP_ALLOWED_HOSTS=${MCP_ALLOWED_HOSTS:-127.0.0.1:*,localhost:*,[::1]:*,uni.lan,uni.lan:*}"
      - "MCP_ALLOWED_ORIGINS=${MCP_ALLOWED_ORIGINS:-http://127.0.0.1:*,http://localhost:*,http://[::1]:*,https://uni.lan,https://uni.lan:*}"
      - MCP_HTTP_ENABLED=true
      # - LOG_LEVEL=DEBUG
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
